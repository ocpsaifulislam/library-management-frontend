<div class="auth-wrapper vh-100 d-flex justify-content-center align-items-center overflow-hidden">
  <div class="container">
    <div class="row justify-content-center w-100 m-0">
      <div class="col-xl-4 col-lg-5 col-md-7 col-sm-9 col-11 px-0">

        <div class="card border-0 shadow-lg auth-card position-relative">
          
          <!-- Avatar Icon -->
          <div class="auth-avatar">
            <img 
              src="https://pluspng.com/img-png/user-png-icon-account-avatar-human-male-man-men-people-person-download-svg-download-png-edit-icon-512.png" 
              alt="User" 
              class="user-image rounded-circle border border-3 border-white p-1 shadow-sm">
          </div>

          <div class="card-body p-3 p-sm-4 pt-4">

            <form #regForm="ngForm" (ngSubmit)="onSubmit(regForm.valid)">
              
              <!-- First Name -->
              <div class="mb-2">
                <label for="firstName" class="form-label mb-1">First Name</label>
                <input 
                  type="text" 
                  id="firstName" 
                  name="firstName"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.firstName" 
                  #firstNameRef="ngModel"
                  required
                  placeholder="Enter first name">
                <div class="text-warning small" *ngIf="firstNameRef.touched && firstNameRef.invalid">
                  First name is required.
                </div>
              </div>

              <!-- Last Name -->
              <div class="mb-2">
                <label for="lastName" class="form-label mb-1">Last Name</label>
                <input 
                  type="text" 
                  id="lastName" 
                  name="lastName"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.lastName" 
                  #lastNameRef="ngModel"
                  required
                  placeholder="Enter last name">
                <div class="text-warning small" *ngIf="lastNameRef.touched && lastNameRef.invalid">
                  Last name is required.
                </div>
              </div>

              <!-- Username -->
              <div class="mb-2">
                <label for="username" class="form-label mb-1">Username</label>
                <input 
                  type="text" 
                  id="username" 
                  name="username"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.username" 
                  #usernameRef="ngModel"
                  required
                  minlength="4"
                  placeholder="Enter username">
                <div class="text-warning small" *ngIf="usernameRef.touched && usernameRef.invalid">
                  Username requires at least 4 characters.
                </div>
              </div>

              <!-- Phone -->
              <div class="mb-2">
                <label for="phoneNumber" class="form-label mb-1">Phone</label>
                <input 
                  type="text" 
                  id="phoneNumber" 
                  name="phoneNumber"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.phoneNumber" 
                  #phoneRef="ngModel"
                  required
                  placeholder="+8801XXXXXXXXX">
                <div class="text-warning small" *ngIf="phoneRef.touched && phoneRef.invalid">
                  Phone number is required.
                </div>
              </div>

              <!-- Email -->
              <div class="mb-2">
                <label for="email" class="form-label mb-1">Email</label>
                <input 
                  type="email" 
                  id="email" 
                  name="email"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.email" 
                  #emailRef="ngModel"
                  required
                  email
                  placeholder="example@email.com">
                <div class="text-warning small" *ngIf="emailRef.touched && emailRef.invalid">
                  Please provide a valid email.
                </div>
              </div>

              <!-- Password -->
              <div class="mb-2">
                <label for="password" class="form-label mb-1">Password</label>
                <input 
                  type="password" 
                  id="password" 
                  name="password"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="registerData.password" 
                  #passRef="ngModel"
                  required
                  minlength="6"
                  placeholder="********">
                <div class="text-warning small" *ngIf="passRef.touched && passRef.invalid">
                  Password must be at least 6 characters.
                </div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-2">
                <label for="c_password" class="form-label mb-1">Confirm Password</label>
                <input 
                  type="password" 
                  id="c_password" 
                  name="c_password"
                  class="form-control form-control-sm py-1" 
                  [(ngModel)]="confirmPassword" 
                  #cPassRef="ngModel"
                  required
                  placeholder="********">
                <div class="text-warning small" *ngIf="cPassRef.touched && registerData.password !== confirmPassword">
                  Passwords do not match.
                </div>
              </div>

              <!-- Submit Button -->
              <div class="d-grid mt-3">
                <button 
                  type="submit" 
                  class="btn btn-my fw-semibold py-1" 
                  [disabled]="isLoading || regForm.invalid || registerData.password !== confirmPassword">
                  {{ isLoading ? 'Registering...' : 'Register' }}
                </button>
              </div>

              <div class="text-center mt-2 login small">
                Already have an account? <a routerLink="/login" class="ms-1">Login</a>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
